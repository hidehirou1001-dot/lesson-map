<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LessonMap - 愛媛県の習い事（ダンス・ピアノなど）検索メディア</title>
  <meta name="description" content="愛媛県（松山市・今治市・新居浜市など）であなたにぴったりの習い事（ピアノ、ダンスなど）を見つけよう。料金やアクセスから簡単検索。">
  <link rel="stylesheet" href="./css/style.css?v=3">
</head>

<body>

  <!-- Header -->
  <header class="header">
    <div class="container">
      <a href="./index.html" class="logo">LessonMap</a>
      <nav style="display: flex; gap: 1rem; align-items: center;">
        <a href="./contact.html" class="btn btn-text" style="font-size: 0.875rem;">お問い合わせ</a>
        <a href="./recommendations.html" class="btn btn-outline"
          style="border-radius: var(--radius-full); padding: 0.5rem 1rem; font-size: 0.875rem;">おすすめ特集を見る</a>
      </nav>
    </div>
  </header>

  <!-- Hero Section -->
  <section class="hero container reveal">
    <h1 class="h1">愛媛県の習い事・教室、<br><span style="color: var(--clr-primary);">ぴったりの場所を見つけよう</span></h1>
    <p>完全未経験の社会人から、プロを目指すキッズまで。エリアやジャンルで条件を絞り込み、あなたに最適なレッスン（ダンス・ピアノ等）を探せます。</p>

    <!-- Search Bar -->
    <div class="search-container">
      <input type="text" id="search-input" class="search-input" placeholder="「大街道」「K-POP」「初心者」などキーワードで検索...">
      <button id="search-btn" class="search-btn">検索する</button>
    </div>

    <!-- Main Category Filters -->
    <div class="filters" style="margin-bottom: var(--space-sm);">
      <button class="filter-btn category-btn active" data-category="Dance">💃 ダンス</button>
      <button class="filter-btn category-btn" data-category="Piano">🎹 ピアノ</button>
      <button class="filter-btn category-btn" data-category="Programming">💻 プログラミング</button>
      <button class="filter-btn category-btn" data-category="Gymnastics">🤸‍♂️ 体操</button>
      <button class="filter-btn category-btn" data-category="Swimming">🏊‍♂️ 水泳</button>
      <button class="filter-btn category-btn" data-category="Yoga">🧘‍♀️ ヨガ・ピラティス</button>
      <button class="filter-btn category-btn" data-category="Cooking">🍳 料理教室</button>
      <button class="filter-btn category-btn" data-category="English">🗣️ 英会話</button>
      <button class="filter-btn category-btn" data-category="Art">🎨 アート・絵画</button>
    </div>

    <!-- Dance Sub-category Filters (Only visible when Dance is selected) -->
    <div id="sub-filters" class="filters" style="margin-bottom: var(--space-sm);">
      <button class="filter-btn sub-btn active" data-filter="all">すべて (ジャンル・特徴)</button>
      <button class="filter-btn sub-btn" data-filter="HIPHOP">HIPHOP</button>
      <button class="filter-btn sub-btn" data-filter="K-POP">K-POP</button>
      <button class="filter-btn sub-btn" data-filter="Kids">👶 キッズクラスあり</button>
      <button class="filter-btn sub-btn" data-filter="parking">🚗 駐車場あり</button>
    </div>

    <!-- Programming Sub-category Filters -->
    <div id="sub-filters-prog" class="filters" style="margin-bottom: var(--space-sm); display: none;">
      <button class="filter-btn sub-btn active" data-filter="all">すべて (ジャンル・特徴)</button>
      <button class="filter-btn sub-btn" data-filter="Programming">プログラミング基礎</button>
      <button class="filter-btn sub-btn" data-filter="Minecraft">マイクラ</button>
      <button class="filter-btn sub-btn" data-filter="Robot">ロボット・工作</button>
    </div>

    <!-- Gymnastics Sub-category Filters -->
    <div id="sub-filters-gym" class="filters" style="margin-bottom: var(--space-sm); display: none;">
      <button class="filter-btn sub-btn active" data-filter="all">すべて (ジャンル・特徴)</button>
      <button class="filter-btn sub-btn" data-filter="Kids">👶 キッズ専用</button>
      <button class="filter-btn sub-btn" data-filter="Acrobat">アクロバット</button>
      <button class="filter-btn sub-btn" data-filter="parking">🚗 駐車場あり</button>
    </div>

    <!-- Swimming Sub-category Filters -->
    <div id="sub-filters-swim" class="filters" style="margin-bottom: var(--space-sm); display: none;">
      <button class="filter-btn sub-btn active" data-filter="all">すべて (ジャンル・特徴)</button>
      <button class="filter-btn sub-btn" data-filter="Baby">👶 ベビー対応</button>
      <button class="filter-btn sub-btn" data-filter="Kids">👦 キッズ</button>
      <button class="filter-btn sub-btn" data-filter="parking">🚗 駐車場あり</button>
    </div>

    <!-- City Filters -->
    <div class="filters" style="margin-bottom: var(--space-lg);">
      <button class="filter-btn city-btn active" data-city="all">愛媛県 全域</button>
      <button class="filter-btn city-btn" data-city="松山市">📍 松山市</button>
      <button class="filter-btn city-btn" data-city="今治市">📍 今治市</button>
      <button class="filter-btn city-btn" data-city="新居浜市">📍 新居浜市</button>
      <button class="filter-btn city-btn" data-city="西条市">📍 西条市</button>
      <button class="filter-btn city-btn" data-city="宇和島市">📍 宇和島市</button>
    </div>
  </section>

  <!-- Studio Results Grid -->
  <section class="section container">
    <div class="section-header"
      style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: var(--space-lg);">
      <h2 class="h2" style="margin-bottom: 0;">検索結果</h2>
      <span style="color: var(--clr-text-muted); font-weight: 600;">愛媛県エリア</span>
    </div>

    <!-- Cards will be injected here by app.js -->
    <div id="studios-grid" class="grid-3">
      <!-- Loading state (optional) -->
      <p style="grid-column: 1/-1; text-align: center; color: var(--clr-text-muted);">スタジオを読み込んでいます...</p>
    </div>
  </section>

  <!-- CTA Section -->
  <section class="section container reveal" style="text-align: center; margin-top: var(--space-xl);">
    <div
      style="background: var(--clr-gradient-surface); border: 1px solid var(--clr-border-glass); padding: var(--space-xl); border-radius: var(--radius-lg); backdrop-filter: var(--backdrop-blur);">
      <h2 class="h2">迷ったら、おすすめ特集をチェック</h2>
      <p style="margin-bottom: var(--space-lg);">目的別やレベル別で、あなたにぴったりのスクールを徹底比較しています。</p>
      <a href="./recommendations.html" class="btn btn-primary"
        style="padding: 1rem 3rem; font-size: 1.125rem;">おすすめ特集一覧を見る ✨</a>
    </div>
  </section>

  <!-- Footer -->
    <footer class="footer">
    <div class="container">
      <a href="./index.html" class="logo " style="font-size: 1.25rem;">LessonMap</a>
      <div style="margin-top: var(--space-md); display: flex; gap: var(--space-md); justify-content: center;">
        <a href="./about.html" style="font-size: 0.875rem; text-decoration: underline;">運営者情報</a>
        <a href="./privacy.html" style="font-size: 0.875rem; text-decoration: underline;">プライバシーポリシー</a>
        <a href="./contact.html" style="font-size: 0.875rem; text-decoration: underline;">お問い合わせ</a>
      </div>
      <p style="margin-top: var(--space-lg); font-size: 0.875rem;">&copy; 2026 LessonMap All rights reserved.</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="./data/studios.js?v=11"></script>
  <script src="./js/app.js?v=12"></script>
</body>

</html>
