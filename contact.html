<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ - LessonMap</title>
  <meta name="description" content="LessonMapへのお問い合わせをお受けしております。愛媛県の習い事・教室掲載依頼やご質問はこちらから。">
  <link rel="stylesheet" href="./css/style.css?v=2">
</head>

<body>
  <!-- Navigation -->
  <header class="header">
    <div class="container">
      <a href="./index.html" class="logo ">LessonMap</a>
      <nav style="display: flex; gap: 1rem; align-items: center;">
        <a href="./contact.html" class="btn btn-text active" style="font-size: 0.875rem;">お問い合わせ</a>
        <a href="./recommendations.html" class="btn btn-outline"
          style="border-radius: var(--radius-full); padding: 0.5rem 1rem; font-size: 0.875rem;">おすすめ特集を見る</a>
      </nav>
    </div>
  </header>

  <main class="container" style="padding-top: 120px; padding-bottom: 80px; max-width: 600px;">
    <h1 class="h2 text-center" style="margin-bottom: var(--space-md);">お問い合わせ</h1>
    <p class="text-center" style="margin-bottom: var(--space-xl); color: var(--clr-text-muted);">
      掲載のご依頼や情報修正、その他ご不明な点がございましたら以下のフォームよりお気軽にご連絡ください。
    </p>

    <form class="card" style="display: flex; flex-direction: column; gap: var(--space-md);"
      action="https://formspree.io/f/mqazwrjv" method="POST">
      <!-- 氏名 -->
      <div style="display: flex; flex-direction: column; gap: 0.5rem;">
        <label for="name" style="font-weight: 500; font-size: 0.9rem;">お名前 <span
            style="color: var(--clr-primary);">*</span></label>
        <input type="text" id="name" name="name" required placeholder="例: 松山 太郎"
          style="padding: 0.75rem; border: 1px solid var(--clr-border); border-radius: var(--radius-md); font-family: inherit; font-size: 1rem;">
      </div>

      <!-- メールアドレス -->
      <div style="display: flex; flex-direction: column; gap: 0.5rem;">
        <label for="email" style="font-weight: 500; font-size: 0.9rem;">メールアドレス <span
            style="color: var(--clr-primary);">*</span></label>
        <input type="email" id="email" name="email" required placeholder="例: info@example.com"
          style="padding: 0.75rem; border: 1px solid var(--clr-border); border-radius: var(--radius-md); font-family: inherit; font-size: 1rem;">
      </div>

      <!-- 種別 -->
      <div style="display: flex; flex-direction: column; gap: 0.5rem;">
        <label for="type" style="font-weight: 500; font-size: 0.9rem;">お問い合わせ種別 <span
            style="color: var(--clr-primary);">*</span></label>
        <select id="type" name="type" required
          style="padding: 0.75rem; border: 1px solid var(--clr-border); border-radius: var(--radius-md); font-family: inherit; font-size: 1rem; background-color: var(--clr-surface);">
          <option value="">選択してください</option>
          <option value="掲載依頼">教室の掲載依頼</option>
          <option value="情報修正">掲載情報の修正</option>
          <option value="その他">その他・ご質問</option>
        </select>
      </div>

      <!-- 内容 -->
      <div style="display: flex; flex-direction: column; gap: 0.5rem;">
        <label for="message" style="font-weight: 500; font-size: 0.9rem;">お問い合わせ内容 <span
            style="color: var(--clr-primary);">*</span></label>
        <textarea id="message" name="message" required rows="6" placeholder="内容をご記入ください..."
          style="padding: 0.75rem; border: 1px solid var(--clr-border); border-radius: var(--radius-md); font-family: inherit; font-size: 1rem; resize: vertical;"></textarea>
      </div>

      <!-- 送信完了後のリダイレクト先 -->
      <input type="hidden" name="_next" value="/thanks.html">

      <button type="submit" class="btn btn-primary"
        style="margin-top: var(--space-sm); width: 100%; justify-content: center; padding: 1rem;">送信する</button>
    </form>
  </main>

    <footer class="footer">
    <div class="container">
      <a href="./index.html" class="logo " style="font-size: 1.25rem;">LessonMap</a>
      <div style="margin-top: var(--space-md); display: flex; gap: var(--space-md); justify-content: center;">
        <a href="./about.html" style="font-size: 0.875rem; text-decoration: underline;">運営者情報</a>
        <a href="./privacy.html" style="font-size: 0.875rem; text-decoration: underline;">プライバシーポリシー</a>
        <a href="./contact.html" style="font-size: 0.875rem; text-decoration: underline;">お問い合わせ</a>
      </div>
      <p style="margin-top: var(--space-lg); font-size: 0.875rem;">&copy; 2026 LessonMap All rights reserved.</p>
    </div>
  </footer>
</body>

</html>
